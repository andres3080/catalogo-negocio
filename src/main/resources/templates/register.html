<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar Administrador</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-body">
<main class="auth-card">
    <h1>Registro de administrador</h1>
    <p class="subtitle">Crea un usuario con acceso al panel.</p>

    <form th:action="@{/register}" th:object="${registerForm}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>Usuario</label>
        <input type="text" th:field="*{username}" required>

        <label>Contrasena</label>
        <input type="password" th:field="*{password}" required>

        <label>Confirmar contrasena</label>
        <input type="password" th:field="*{confirmPassword}" required>

        <button type="submit" class="btn-primary">Crear admin</button>
    </form>

    <p th:if="${error}" th:text="${error}" class="error-text"></p>
    <a th:href="@{/login}">Ya tengo usuario</a>
</main>
</body>
</html>
